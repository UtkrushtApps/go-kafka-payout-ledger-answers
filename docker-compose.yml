services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka
    container_name: payout-ledger-kafka
    ports:
      - "127.0.0.1:29092:29092"
    command:
      - bash
      - -lc
      - |
        cat >/tmp/kafka.properties <<'EOF'
        process.roles=broker,controller
        node.id=1
        controller.quorum.voters=1@kafka:9093
        listeners=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,HOST://0.0.0.0:29092
        advertised.listeners=PLAINTEXT://kafka:9092,HOST://localhost:29092
        listener.security.protocol.map=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,HOST:PLAINTEXT
        inter.broker.listener.name=PLAINTEXT
        controller.listener.names=CONTROLLER
        log.dirs=/var/lib/kafka/data
        offsets.topic.replication.factor=1
        transaction.state.log.replication.factor=1
        transaction.state.log.min.isr=1
        group.initial.rebalance.delay.ms=0
        auto.create.topics.enable=false
        num.partitions=3
        EOF
        kafka-storage format --ignore-formatted --cluster-id MkU3OEVBNTcwNTJENDM2Qk --config /tmp/kafka.properties
        kafka-server-start /tmp/kafka.properties
    healthcheck:
      test: ["CMD", "bash", "-lc", "kafka-topics --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - kafka-data:/var/lib/kafka/data

  payout-ledger:
    build:
      context: /root/task
      dockerfile: Dockerfile
    container_name: payout-ledger-worker
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kafka-data:
